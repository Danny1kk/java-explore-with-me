server.port=9090

spring.datasource.driverClassName=org.postgresql.Driver
# ??? Docker: jdbc:postgresql://stats-db:5432/stats
# ??? ?????????? ???????: jdbc:postgresql://localhost:6543/stats
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:6543/stats}
