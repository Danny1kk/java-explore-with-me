services:
  stats-server:
    build:
      context: .
      dockerfile: stats-service/server/Dockerfile
    container_name: stats-server
    ports:
      - "9090:9090"
    environment:
      - SERVER_PORT=9090
      - SPRING_DATASOURCE_URL=jdbc:postgresql://stats-db:5432/stats
      - SPRING_DATASOURCE_USERNAME=practicum
      - SPRING_DATASOURCE_PASSWORD=practicum
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      stats-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  stats-db:
    image: postgres:14-alpine
    container_name: stats-db
    ports:
      - "6543:5432"
    environment:
      - POSTGRES_DB=stats
      - POSTGRES_USER=practicum
      - POSTGRES_PASSWORD=practicum
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U practicum -d stats" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  ewm-service:
    build:
      context: .
      dockerfile: ewm-service/Dockerfile
    container_name: ewm-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ewm-db:5432/ewm
      - SPRING_DATASOURCE_USERNAME=practicum
      - SPRING_DATASOURCE_PASSWORD=practicum
      - STATS_SERVER_URL=http://stats-server:9090
    depends_on:
      ewm-db:
        condition: service_healthy
      stats-server:
        condition: service_healthy

  ewm-db:
    image: postgres:14-alpine
    container_name: ewm-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ewm
      - POSTGRES_USER=practicum
      - POSTGRES_PASSWORD=practicum
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U practicum -d ewm" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s